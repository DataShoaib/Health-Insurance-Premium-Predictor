name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:

      # Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configure AWS access
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      # DVC needs Python to pull model from S3
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Install DVC
        run: pip install dvc[s3]


      # Pull trained model — required for docker build COPY models ./models
      - name: Pull model from S3
        run: dvc pull

      # Authenticate Docker with ECR
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com

      # Build, tag and push image to ECR
      - name: Build Docker image
        run: docker build -t my-mlops-api .

      - name: Tag Docker image
        run: |
          docker tag my-mlops-api:latest \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/my-mlops-api:latest

      - name: Push image to ECR
        run: |
          docker push \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com/my-mlops-api:latest

      # SSH into EC2 and deploy all containers
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Login to ECR from EC2
            aws ecr get-login-password --region ${{ secrets.AWS_DEFAULT_REGION }} \
            | docker login --username AWS --password-stdin \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_DEFAULT_REGION }}.amazonaws.com

            # Move to project directory
            cd /home/ubuntu/app/Health-Insurance-Premium-Predictor

            # Pull latest code changes
            git pull origin master

            # Set env vars used in docker-compose.yml
            export AWS_ACCOUNT_ID=${{ secrets.AWS_ACCOUNT_ID }}
            export AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}

            # Restart all containers with latest image
            docker compose down || true
            docker compose pull app
            docker compose up -d

            # Health check
            sleep 5
            curl -f http://localhost:8000/ || exit 1
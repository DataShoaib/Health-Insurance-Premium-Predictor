stages:
  Data-Ingesion:
    cmd: python -m src.data.data_ingesion
    deps:
    - data/raw/insurance.csv
    - logger/logger.py
    - src/data/data_ingesion.py
    outs:
    - data/interim/cleaned_data.csv
  Feature-Engineering:
    cmd: python -m src.features.feature_engineering
    deps:
    - data/interim/cleaned_data.csv
    - logger/logger.py
    - src/features/feature_engineering.py
    outs:
    - data/proccessed/x_test.csv
    - data/proccessed/x_train.csv
    - data/proccessed/y_test.csv
    - data/proccessed/y_train.csv
  Model-Training:
    cmd: python -m src.model.model_building
    deps:
    - data/proccessed/x_train
    - data/proccessed/y_train
    - logger/logger.py
    - src/features/feature_engineering.py
    - src/utils.py
    outs:
    - models/model.pkl
